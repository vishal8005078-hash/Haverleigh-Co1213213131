<script>
/* ════════════════════════════════════════════════════════════
   SITE ENGINE — Do not edit below this line
   ════════════════════════════════════════════════════════════ */

// State
let currentPage = 'home';
let currentProduct = null;
let activeFilter = 'all';

// ── DOM helpers ──────────────────────────────────────────────
const $ = id => document.getElementById(id);
const el = (tag, attrs = {}, ...children) => {
  const e = document.createElement(tag);
  Object.entries(attrs).forEach(([k, v]) => {
    if (k === 'className') e.className = v;
    else if (k === 'onclick') e.onclick = v;
    else if (k === 'href') e.href = v;
    else e.setAttribute(k, v);
  });
  children.forEach(c => {
    if (typeof c === 'string') e.insertAdjacentHTML('beforeend', c);
    else e.appendChild(c);
  });
  return e;
};

// ── Navigation ───────────────────────────────────────────────
function navigate(page, catId = null) {
  // Hide all pages
  document.querySelectorAll('.page-section').forEach(p => p.classList.remove('active'));
  currentPage = page;
  window.scrollTo({ top: 0, behavior: 'smooth' });

  if (page === 'home') {
    $('page-home').classList.add('active');
  } else if (page === 'new') {
    $('page-new').classList.add('active');
    renderNewPage();
    triggerInnerPage();
  } else if (page === 'all') {
    $('page-all').classList.add('active');
    renderAllPage();
    triggerInnerPage();
  } else if (page === 'category') {
    $('page-category').classList.add('active');
    renderCategoryPage(catId);
    triggerInnerPage();
  }

  // Update active nav link
  document.querySelectorAll('.nav-links a').forEach(a => {
    a.classList.toggle('active', a.dataset.page === page);
  });

  // Close mobile menu
  $('nav-menu').classList.remove('open');
  $('hamburger').classList.remove('open');
}

// ── Loader ───────────────────────────────────────────────────
window.addEventListener('load', () => {
  setTimeout(() => {
    $('loader').classList.add('hidden');
  }, 1200);
});

// ── Cursor ───────────────────────────────────────────────────
const cursor = $('cursor');
const cursorRing = $('cursor-ring');
let mx = 0, my = 0, rx = 0, ry = 0;
document.addEventListener('mousemove', e => {
  mx = e.clientX; my = e.clientY;
  cursor.style.left = mx + 'px';
  cursor.style.top = my + 'px';
});
function animateRing() {
  rx += (mx - rx) * 0.12;
  ry += (my - ry) * 0.12;
  cursorRing.style.left = rx + 'px';
  cursorRing.style.top = ry + 'px';
  requestAnimationFrame(animateRing);
}
animateRing();

// ── Nav ──────────────────────────────────────────────────────
// Logo
const navLogoImg = $('nav-logo-img');
navLogoImg.src = STORE.logoPath;
navLogoImg.style.height = STORE.logoHeight + 'px';
navLogoImg.style.width = 'auto';
// Fallback: if logo fails to load, show text name instead
navLogoImg.onerror = () => {
  navLogoImg.style.display = 'none';
  $('nav-brand-name').style.display = 'inline';
  $('nav-brand-name').textContent = STORE.name;
};
$('nav-brand-name').textContent = STORE.name;
const navPageMap = { "Home": "home", "What's New": "new", "All Jewellery": "all", "Categories": "all" };
const navMenu = $('nav-menu');
STORE.nav.forEach(label => {
  const li = document.createElement('li');
  const a = document.createElement('a');
  a.textContent = label;
  a.href = '#';
  const pageKey = navPageMap[label] || 'home';
  a.dataset.page = pageKey;
  a.onclick = e => { e.preventDefault(); navigate(pageKey); };
  li.appendChild(a);
  navMenu.appendChild(li);
});

// Hamburger
$('hamburger').addEventListener('click', () => {
  $('hamburger').classList.toggle('open');
  navMenu.classList.toggle('open');
});

// Nav scroll
window.addEventListener('scroll', () => {
  $('navbar').classList.toggle('scrolled', window.scrollY > 40);
});

// ── Hero ─────────────────────────────────────────────────────
// Banner image (above title)
const heroBannerWrap = $('hero-banner-wrap');
const heroBannerImg  = $('hero-banner-img');
if (STORE.showBanner && STORE.bannerPath) {
  heroBannerImg.src = STORE.bannerPath;
  heroBannerImg.style.maxHeight = STORE.bannerMaxHeight + 'px';
  heroBannerImg.onerror = () => { heroBannerWrap.style.display = 'none'; };
} else {
  heroBannerWrap.style.display = 'none';
}

$('hero-sub-text').textContent = STORE.hero.subtitle;

// Hero title animation
const heroTitle = $('hero-title-el');
heroTitle.style.opacity = '1';
STORE.hero.title.split(' ').forEach((word, wi) => {
  const wordSpan = document.createElement('span');
  wordSpan.className = 'word';
  const inner = document.createElement('span');
  inner.textContent = word;
  inner.style.animationDelay = `${0.2 + wi * 0.15}s`;
  wordSpan.appendChild(inner);
  heroTitle.appendChild(wordSpan);
  if (wi < STORE.hero.title.split(' ').length - 1) {
    heroTitle.appendChild(document.createTextNode(' '));
  }
});

// Hero CTA
const ctaDiv = $('hero-cta');
const cta1 = document.createElement('a');
cta1.href = '#'; cta1.className = 'btn-primary';
cta1.textContent = STORE.hero.cta1.label;
cta1.onclick = e => { e.preventDefault(); navigate(STORE.hero.cta1.page); };
const cta2 = document.createElement('a');
cta2.href = '#'; cta2.className = 'btn-ghost';
cta2.textContent = STORE.hero.cta2.label;
cta2.onclick = e => { e.preventDefault(); navigate(STORE.hero.cta2.page); };
ctaDiv.appendChild(cta1); ctaDiv.appendChild(cta2);

// ── Marquee ──────────────────────────────────────────────────
function buildMarquee() {
  const track = $('marquee-track');
  const items = [...STORE.marqueeItems, ...STORE.marqueeItems];
  items.forEach(text => {
    const div = document.createElement('div');
    div.className = 'marquee-item';
    div.innerHTML = `<em>${text}</em>`;
    track.appendChild(div);
  });
}
buildMarquee();

// ── Product Card Builder ────────────────────────────────────
const ICONS = {
  bangle:   `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1"><circle cx="12" cy="12" r="9"/><circle cx="12" cy="12" r="5"/></svg>`,
  earring:  `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1"><circle cx="12" cy="5" r="2"/><path d="M12 7v8"/><circle cx="12" cy="17" r="3"/></svg>`,
  necklace: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1"><path d="M4 4c0 8 3 13 8 13s8-5 8-13"/><circle cx="12" cy="18" r="2"/></svg>`,
  ring:     `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1"><ellipse cx="12" cy="12" rx="9" ry="5"/></svg>`,
  bracelet: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1"><path d="M5 12a7 7 0 0 1 14 0"/><path d="M5 12a7 7 0 0 0 14 0"/></svg>`,
  anklet:   `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1"><ellipse cx="12" cy="16" rx="7" ry="3"/><path d="M12 6v7"/><circle cx="12" cy="5" r="2"/></svg>`,
  pendant:  `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1"><path d="M12 2v6"/><path d="M8 8l4 4 4-4"/><path d="M6 12l6 9 6-9"/></svg>`,
  set:      `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1"><circle cx="8" cy="8" r="4"/><circle cx="16" cy="16" r="4"/></svg>`,
  chain:    `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg>`,
  hair:     `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1"><path d="M12 2C6.5 2 2 6.5 2 12s4.5 10 10 10 10-4.5 10-10"/><path d="M12 6v6l3 3"/></svg>`,
  watch:    `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1"><rect x="5" y="8" width="14" height="12" rx="2"/><path d="M8 8V6a4 4 0 0 1 8 0v2"/><path d="M8 20v2"/><path d="M16 20v2"/><path d="M12 12v3l2 1"/></svg>`
};

function buildProductCard(product) {
  const card = document.createElement('div');
  card.className = 'product-card reveal';
  const tagHtml = product.tag ? `<span class="product-tag ${product.tag.toLowerCase()}">${product.tag}</span>` : '';
  card.innerHTML = `
    <div class="product-img-wrap">
      <img src="${product.image}" alt="${product.name}" loading="lazy">
      ${tagHtml}
      <div class="product-overlay">
        <button class="product-quick-view">Quick View</button>
      </div>
    </div>
    <div class="product-info">
      <div class="product-name">${product.name}</div>
      <div class="product-price">${product.price}</div>
    </div>
  `;
  card.addEventListener('click', () => openModal(product));
  return card;
}

// ── Home New Grid ────────────────────────────────────────────
function buildHomeNew() {
  const grid = $('home-new-grid');
  grid.innerHTML = '';
  const newItems = STORE.products.filter(p => p.isNew).slice(0, 3);
  newItems.forEach(p => grid.appendChild(buildProductCard(p)));
}
buildHomeNew();

// ── Categories Grid ──────────────────────────────────────────
function buildCategoriesGrid() {
  const grid = $('categories-grid');
  grid.innerHTML = '';
  STORE.categories.forEach(cat => {
    const count = STORE.products.filter(p => p.category === cat.id).length;
    const a = document.createElement('a');
    a.href = '#'; a.className = 'cat-card reveal';
    a.innerHTML = `
      <div class="cat-icon">${ICONS[cat.icon] || ICONS.set}</div>
      <div class="cat-name">${cat.name}</div>
      <div class="cat-count">${count} piece${count !== 1 ? 's' : ''}</div>
    `;
    a.onclick = e => { e.preventDefault(); navigate('category', cat.id); };
    grid.appendChild(a);
  });
}
buildCategoriesGrid();

// ── Footer ────────────────────────────────────────────────────
function fillFooter(brandId, taglineId, copyId) {
  const b = $(brandId), t = $(taglineId), c = $(copyId);
  if (b) b.textContent = STORE.name;
  if (t) t.textContent = "Women's Studio";
  if (c) c.textContent = `© ${new Date().getFullYear()} ${STORE.name}. All rights reserved.`;
}
fillFooter('footer-brand', 'footer-tagline', 'footer-copy');

// Footer links on home page
const footerLinks = $('footer-links');
if (footerLinks) {
  const cols = [
    { title: 'Shop', links: STORE.categories.slice(0, 4).map(c => ({ label: c.name, cat: c.id })) },
    { title: 'Connect', links: [
      { label: '@' + STORE.instagramStore, url: 'https://www.instagram.com/' + STORE.instagramStore },
      { label: '@' + STORE.instagramOwner, url: 'https://www.instagram.com/' + STORE.instagramOwner }
    ]}
  ];
  cols.forEach(col => {
    const div = document.createElement('div');
    div.className = 'footer-col';
    const ul = document.createElement('ul');
    col.links.forEach(link => {
      const li = document.createElement('li');
      const a = document.createElement('a');
      a.textContent = link.label;
      if (link.url) { a.href = link.url; a.target = '_blank'; a.rel = 'noopener'; }
      else { a.href = '#'; a.onclick = e => { e.preventDefault(); navigate('category', link.cat); }; }
      li.appendChild(a); ul.appendChild(li);
    });
    div.innerHTML = `<h5>${col.title}</h5>`;
    div.appendChild(ul);
    footerLinks.appendChild(div);
  });
}

// Social link
const storeIgLink = $('store-ig-link');
if (storeIgLink) {
  storeIgLink.href = 'https://www.instagram.com/' + STORE.instagramStore;
  $('store-ig-label').textContent = '@' + STORE.instagramStore;
}

// ── Page: What's New ─────────────────────────────────────────
function renderNewPage() {
  document.querySelectorAll('.inner-hero').forEach(h => h.classList.remove('inner-page-loaded'));
  const grid = $('new-grid');
  grid.innerHTML = '';
  fillFooter('footer-brand-new', 'footer-tagline-new', 'footer-copy-new');
  STORE.products.filter(p => p.isNew).forEach(p => grid.appendChild(buildProductCard(p)));
  setTimeout(initReveal, 100);
}

// ── Page: All ────────────────────────────────────────────────
function renderAllPage(filter = 'all') {
  document.querySelectorAll('.inner-hero').forEach(h => h.classList.remove('inner-page-loaded'));
  activeFilter = filter;
  const grid = $('all-grid');
  const filterRow = $('all-filter-row');
  grid.innerHTML = '';
  filterRow.innerHTML = '';
  fillFooter('footer-brand-all', 'footer-tagline-all', 'footer-copy-all');

  // Filter buttons
  const allBtn = document.createElement('button');
  allBtn.className = `filter-btn ${filter === 'all' ? 'active' : ''}`;
  allBtn.textContent = 'All';
  allBtn.onclick = () => renderAllPage('all');
  filterRow.appendChild(allBtn);

  STORE.categories.forEach(cat => {
    const count = STORE.products.filter(p => p.category === cat.id).length;
    if (count === 0) return;
    const btn = document.createElement('button');
    btn.className = `filter-btn ${filter === cat.id ? 'active' : ''}`;
    btn.textContent = cat.name;
    btn.onclick = () => renderAllPage(cat.id);
    filterRow.appendChild(btn);
  });

  const filtered = filter === 'all' ? STORE.products : STORE.products.filter(p => p.category === filter);
  filtered.forEach(p => grid.appendChild(buildProductCard(p)));
  setTimeout(initReveal, 100);
}

// ── Page: Category ────────────────────────────────────────────
function renderCategoryPage(catId) {
  const cat = STORE.categories.find(c => c.id === catId);
  if (!cat) { navigate('all'); return; }
  // Reset inner-page animation so it re-triggers
  document.querySelectorAll('.inner-hero').forEach(h => h.classList.remove('inner-page-loaded'));
  $('cat-page-label').textContent = 'Category';
  $('cat-page-title').textContent = cat.name;
  fillFooter('footer-brand-cat', 'footer-tagline-cat', 'footer-copy-cat');
  const grid = $('cat-grid');
  grid.innerHTML = '';
  STORE.products.filter(p => p.category === catId).forEach(p => grid.appendChild(buildProductCard(p)));
  setTimeout(initReveal, 100);
}

// ── Product Modal ────────────────────────────────────────────
function openModal(product) {
  currentProduct = product;
  $('modal-img').src = product.image;
  $('modal-img').alt = product.name;
  $('modal-tag').textContent = product.tag || product.category.charAt(0).toUpperCase() + product.category.slice(1);
  $('modal-name').textContent = product.name;
  $('modal-price').textContent = product.price;
  $('modal-desc').textContent = product.description;
  $('modal').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeModal() {
  $('modal').classList.remove('open');
  document.body.style.overflow = '';
  currentProduct = null;
}

$('modal').addEventListener('click', e => {
  if (e.target === $('modal') || e.target.classList.contains('modal-inner')) closeModal();
});

// ── Enquire Popup ─────────────────────────────────────────────
function openEnquire() {
  if (!currentProduct) return;
  const msg = `Hi! I just saw the *${currentProduct.name}* (${currentProduct.price}) on Haverleigh & Co — I'm absolutely in love with it ✨ Could you please share more details? I'd love to place an order 🤍`;
  $('enquire-product-name').textContent = currentProduct.name;
  $('enquire-message-text').textContent = msg;
  // WhatsApp deep link — number from edit zone, message pre-filled
  const waUrl = `https://wa.me/${STORE.whatsappNumber}?text=${encodeURIComponent(msg)}`;
  $('enquire-wa-link').href = waUrl;
  $('copy-success').classList.remove('show');
  $('enquire-popup').classList.add('open');
}

function closeEnquire() {
  $('enquire-popup').classList.remove('open');
}

function copyMessage() {
  const text = $('enquire-message-text').textContent;
  navigator.clipboard.writeText(text).then(() => {
    $('copy-success').classList.add('show');
    showToast('Message copied!');
  }).catch(() => {
    const ta = document.createElement('textarea');
    ta.value = text;
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
    $('copy-success').classList.add('show');
    showToast('Message copied!');
  });
}

// ── Toast ─────────────────────────────────────────────────────
function showToast(msg) {
  const toast = $('toast');
  toast.textContent = msg;
  toast.classList.add('show');
  setTimeout(() => toast.classList.remove('show'), 2500);
}

// ── Scroll Reveal ─────────────────────────────────────────────
function initReveal() {
  const obs = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
      if (entry.isIntersecting) {
        entry.target.classList.add('visible');
        obs.unobserve(entry.target);
      }
    });
  }, { threshold: 0.08, rootMargin: '0px 0px -32px 0px' });

  document.querySelectorAll('.reveal').forEach(el => obs.observe(el));

  // Cat cards — stagger each one
  const catObs = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
      if (entry.isIntersecting) {
        entry.target.classList.add('visible');
        catObs.unobserve(entry.target);
      }
    });
  }, { threshold: 0.05 });
  document.querySelectorAll('.cat-card').forEach((card, i) => {
    card.style.transitionDelay = `${i * 0.06}s`;
    catObs.observe(card);
  });

  // Marquee
  const mq = document.querySelector('.marquee-section');
  if (mq) {
    const mqObs = new IntersectionObserver(([e]) => {
      if (e.isIntersecting) { mq.classList.add('visible'); mqObs.disconnect(); }
    }, { threshold: 0.2 });
    mqObs.observe(mq);
  }
}

// Inner page animation trigger
function triggerInnerPage() {
  setTimeout(() => {
    document.querySelectorAll('.inner-hero').forEach(h => h.classList.add('inner-page-loaded'));
  }, 80);
}
initReveal();

// ── Init Home Page ────────────────────────────────────────────
navigate('home');

// ESC key
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') { closeModal(); closeEnquire(); }
});

</script>
